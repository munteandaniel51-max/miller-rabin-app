<html lang="ro">
<head>
  <meta charset="UTF-8" />

  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #dbe3ef;
      --green-bg: #eaf8e8;
      --green-border: #b8dfb4;
      --green-text: #2f6d2d;
      --red-bg: #fde8e8;
      --red-border: #efb5b5;
      --red-text: #a33a3a;
      --accent: #2563eb;
      --soft-blue: #eef4ff;
    }

    * { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      display: flex;
      flex-direction: column;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 28px 16px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      flex: 1;
    }

    .header {
      margin-bottom: 18px;
    }

    .header h1 {
      margin: 0 0 8px;
      font-size: 32px;
    }

    .header p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.06);
      margin-bottom: 18px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: end;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      align-items: end;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    input, select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      font-size: 16px;
      background: #fff;
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 16px;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .solution-box {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 22px;
      background: #fff;
      min-height: 120px;
    }

    .section-title {
      font-size: 22px;
      margin: 0 0 14px;
    }

    .sub-title {
      margin: 20px 0 10px;
      font-size: 18px;
    }

    .inline-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin: 8px 0;
    }

    .label-text {
      font-weight: 700;
    }

    .cell {
      min-width: 70px;
      padding: 9px 10px;
      border-radius: 8px;
      border: 1px solid var(--green-border);
      background: var(--green-bg);
      color: var(--green-text);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-weight: 700;
    }

    .cell.long {
      min-width: 140px;
    }

    .ok {
      color: #16a34a;
      font-weight: 700;
      margin-left: 4px;
    }

    .bad {
      color: #dc2626;
      font-weight: 700;
      margin-left: 4px;
    }

    .iter-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      margin-top: 16px;
      background: #fafcff;
    }

    .iter-card.compus {
      border-color: var(--red-border);
      background: var(--red-bg);
    }

    .formula {
      font-weight: 700;
      white-space: nowrap;
    }

    .footer-result {
      margin-top: 20px;
      padding: 14px;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 700;
      border: 1px solid var(--green-border);
      background: var(--green-bg);
      color: var(--green-text);
    }

    .footer-result.compus {
      border-color: var(--red-border);
      background: var(--red-bg);
      color: var(--red-text);
    }

    .hidden {
      display: none;
    }

    .pollard-table {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }

    .pollard-row {
      display: grid;
      grid-template-columns: 80px 120px 80px 120px 1fr 120px;
      gap: 10px;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #eef2f7;
    }

    .pollard-row:last-child {
      border-bottom: 0;
    }

    .pollard-label {
      font-weight: 700;
    }

    .pollard-value {
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #f8fafc;
      min-height: 42px;
      display: flex;
      align-items: center;
    }

    .pollard-gcd {
      font-style: italic;
      color: #374151;
      font-weight: 700;
    }

    .method-box {
      padding: 12px 14px;
      border-radius: 14px;
      background: var(--soft-blue);
      border: 1px solid #d7e3ff;
      margin-bottom: 18px;
      font-weight: 700;
      color: #1e3a8a;
    }

    .footer {
      text-align: center;
      padding: 20px 0;
      color: #6b7280;
      font-size: 14px;
      border-top: 1px solid #dbe3ef;
      background: #ffffff;
      margin-top: 20px;
    }

    @media (max-width: 900px) {
      .pollard-row {
        grid-template-columns: 1fr;
        background: #fafcff;
        border: 1px solid #e5edf7;
        border-radius: 12px;
        padding: 12px;
      }
    }

    @media (max-width: 700px) {
      .header h1 { font-size: 25px; }
      .cell { min-width: 60px; font-size: 14px; }
      .cell.long { min-width: 110px; }
    }

    .fermat-table {
  display: grid;
  gap: 10px;
  margin-top: 16px;
}

.fermat-row {
  display: grid;
  grid-template-columns: 220px 120px 220px 120px;
  gap: 10px;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid #eef2f7;
}

.fermat-row:last-child {
  border-bottom: 0;
}

.fermat-label {
  font-weight: 700;
  color: #374151;
}

.fermat-value {
  padding: 10px 12px;
  border-radius: 8px;
  border: 1px solid var(--line);
  background: #f8fafc;
  min-height: 42px;
  display: flex;
  align-items: center;
}

@media (max-width: 900px) {
  .fermat-row {
    grid-template-columns: 1fr;
    background: #fafcff;
    border: 1px solid #e5edf7;
    border-radius: 12px;
    padding: 12px;
  }
}

<body>
  <div class="container">

    <!-- Miller-Rabin -->

    <!-- Fermat -->
     <div class="panel hidden" id="fermatPanel">
  <div class="form-grid">
    <div>
      <label for="fermatNInput">Numărul n</label>
      <input id="fermatNInput" type="number" min="2" step="1" />
    </div>

    <div>
      <label for="fermatStepsInput">Număr maxim de iterații</label>
      <input id="fermatStepsInput" type="number" min="1" step="1" />
    </div>
  </div>

  <div class="btn-row">
    <button class="btn-primary" id="solveFermatBtn">Rezolvă prin Fermat</button>

    <div class="panel">

  <script>
    function gcd(a, b) {
      a = a < 0n ? -a : a;
      b = b < 0n ? -b : b;
      while (b !== 0n) {
        let r = a % b;
        a = b;
        b = r;
      }
      return a;
    }

    function modMul(a, b, mod) {
      let rezultat = 0n;
      a = ((a % mod) + mod) % mod;
      b = ((b % mod) + mod) % mod;

      while (b > 0n) {
        if (b & 1n) {
          rezultat = (rezultat + a) % mod;
        }
        a = (a * 2n) % mod;
        b >>= 1n;
      }
      return rezultat;
    }

    function modPow(baza, exp, mod) {
      let rezultat = 1n % mod;
      baza = ((baza % mod) + mod) % mod;

      while (exp > 0n) {
        if (exp & 1n) {
          rezultat = modMul(rezultat, baza, mod);
        }
        baza = modMul(baza, baza, mod);
        exp >>= 1n;
      }
      return rezultat;
    }

    function toBinary(x) {
      if (x === 0n) return '0';
      let s = '';
      while (x > 0n) {
        s = String(x % 2n) + s;
        x /= 2n;
      }
      return s;
    }

    function parseBases(text) {
      return text
        .split(',')
        .map(v => v.trim())
        .filter(Boolean)
        .map(v => BigInt(v));
    }

    function renderCell(value, extraClass = '') {
      return `<span class="cell ${extraClass}">${value}</span><span class="ok">✓</span>`;
    }

    function calculeazaIteratie(n, a, s, t) {
      const rez = {
        sus: [],
        jos: [],
        compus: false
      };

      const tBin = toBinary(t);
      const necesareSus = tBin.length;

      let val = a % n;
      for (let i = 0; i < 10; i++) {
        if (i < necesareSus) {
          rez.sus.push(val.toString());
          val = modMul(val, val, n);
        } else {
          rez.sus.push('x');
        }
      }

      const lantValori = [];
      let x = modPow(a, t, n);
      lantValori.push(x);

      for (let i = 1; i <= Number(s); i++) {
        x = modMul(x, x, n);
        lantValori.push(x);
      }

      for (let i = 0; i < 5; i++) {
        if (i <= Number(s)) {
          rez.jos.push(lantValori[i].toString());
        } else {
          rez.jos.push('x');
        }
      }

      let trece = false;

      if (lantValori[0] === 1n || lantValori[0] === n - 1n) {
        trece = true;
      } else {
        for (let i = 1; i < lantValori.length; i++) {
          if (lantValori[i] === n - 1n) {
            trece = true;
            break;
          }
        }
      }

      rez.compus = !trece;
      return rez;
    }

    function iteratieX(a) {
      return {
        sus: Array(10).fill('x'),
        jos: Array(5).fill('x'),
        compus: false
      };
    }

    function renderIteratie(a, rez, index) {
      return `
        <div class="iter-card ${rez.compus ? 'compus' : ''}">
          <div class="sub-title">Iterația k = ${index + 1} pentru a = ${a} (rezultate mod n)</div>

          <div class="inline-row">
            <span class="formula">${a}<sup>2<sup>0</sup></sup> =</span> ${renderCell(rez.sus[0])}
            <span class="formula">${a}<sup>2<sup>1</sup></sup> =</span> ${renderCell(rez.sus[1])}
            <span class="formula">${a}<sup>2<sup>2</sup></sup> =</span> ${renderCell(rez.sus[2])}
            <span class="formula">${a}<sup>2<sup>3</sup></sup> =</span> ${renderCell(rez.sus[3])}
            <span class="formula">${a}<sup>2<sup>4</sup></sup> =</span> ${renderCell(rez.sus[4])}
          </div>

          <div class="inline-row">
            <span class="formula">${a}<sup>2<sup>5</sup></sup> =</span> ${renderCell(rez.sus[5])}
            <span class="formula">${a}<sup>2<sup>6</sup></sup> =</span> ${renderCell(rez.sus[6])}
            <span class="formula">${a}<sup>2<sup>7</sup></sup> =</span> ${renderCell(rez.sus[7])}
            <span class="formula">${a}<sup>2<sup>8</sup></sup> =</span> ${renderCell(rez.sus[8])}
            <span class="formula">${a}<sup>2<sup>9</sup></sup> =</span> ${renderCell(rez.sus[9])}
          </div>

          <div class="inline-row" style="margin-top:14px;">
            <span class="formula">${a}<sup>t</sup> =</span> ${renderCell(rez.jos[0])}
            <span class="formula">${a}<sup>2t</sup> =</span> ${renderCell(rez.jos[1])}
            <span class="formula">${a}<sup>2<sup>2</sup>t</sup> =</span> ${renderCell(rez.jos[2])}
            <span class="formula">${a}<sup>2<sup>3</sup>t</sup> =</span> ${renderCell(rez.jos[3])}
            <span class="formula">${a}<sup>2<sup>4</sup>t</sup> =</span> ${renderCell(rez.jos[4])}
          </div>

          <div class="inline-row" style="margin-top:12px;">
            <span class="label-text">Verdict pentru baza ${a}:</span>
            <span class="${rez.compus ? 'bad' : 'ok'}">${rez.compus ? 'numărul este compus la această bază' : 'baza trece testul'}</span>
          </div>
        </div>
      `;
    }

    function solveMiller() {
      const output = document.getElementById('output');
      let n;
      let baze;

      try {
        const nText = document.getElementById('nInput').value.trim();
        if (!nText) {
          output.innerHTML = '<div class="bad">Introdu valoarea lui n.</div>';
          return;
        }

        n = BigInt(nText);
        baze = parseBases(document.getElementById('basesInput').value.trim());
      } catch (e) {
        output.innerHTML = '<div class="bad">Date invalide. Verifică valorile introduse.</div>';
        return;
      }

      if (n < 2n) {
        output.innerHTML = '<div class="bad">n trebuie să fie ≥ 2.</div>';
        return;
      }

      if (n === 2n || n === 3n) {
        output.innerHTML = `
          <h2 class="section-title">Soluție</h2>
          <div class="footer-result">Concluzie: n este prim (da/nu): da</div>
        `;
        return;
      }

      if (n % 2n === 0n) {
        output.innerHTML = `
          <h2 class="section-title">Soluție</h2>
          <div class="footer-result compus">n este par, deci nu este prim.</div>
        `;
        return;
      }

      let s = 0n;
      let t = n - 1n;
      while (t % 2n === 0n) {
        t /= 2n;
        s++;
      }

      let compus = false;
      const rezultate = [];

      for (let i = 0; i < baze.length; i++) {
        const a = baze[i];

        if (compus) {
          rezultate.push({ a, rez: iteratieX(a) });
          continue;
        }

        if (a % n === 0n) {
          rezultate.push({ a, rez: iteratieX(a) });
          continue;
        }

        const rez = calculeazaIteratie(n, a, s, t);
        rezultate.push({ a, rez });

        if (rez.compus) {
          compus = true;
        }
      }

      let html = `
        <h2 class="section-title">Soluție — Miller–Rabin</h2>
        <div class="sub-title">Descompunere</div>
        <div class="inline-row">
          <span class="label-text">s =</span> ${renderCell(s.toString())}
          <span class="label-text">t =</span> ${renderCell(t.toString())}
          <span class="label-text">t în binar =</span> ${renderCell(toBinary(t), 'long')}
        </div>
      `;

      rezultate.forEach((item, index) => {
        html += renderIteratie(item.a.toString(), item.rez, index);
      });

      html += `
        <div class="footer-result ${compus ? 'compus' : ''}">
          Concluzie: n este prim (da/nu): ${compus ? 'nu' : 'da'}
        </div>
      `;

      output.innerHTML = html;
    }

    function buildFunction(expr) {
      const normalized = expr.replace(/\^/g, '**').trim();

      if (!normalized) {
        throw new Error('Funcția f(x) nu poate fi goală.');
      }

      return function(x, n) {
        const result = Function('x', 'n', `
          return (${normalized});
        `)(Number(x), Number(n));

        if (!Number.isFinite(result)) {
          throw new Error('Funcția f(x) a generat un rezultat invalid.');
        }

        let val = BigInt(Math.trunc(result));
        val = ((val % n) + n) % n;
        return val;
      };
    }

    function solvePollard() {
      const output = document.getElementById('output');

      try {
        const nText = document.getElementById('pollardNInput').value.trim();
        const fxText = document.getElementById('pollardFunctionInput').value.trim();
        const x0Text = document.getElementById('pollardX0Input').value.trim();
        const stepsText = document.getElementById('pollardStepsInput').value.trim();

        if (!nText || !fxText || !x0Text || !stepsText) {
          output.innerHTML = '<div class="bad">Completează toate câmpurile pentru metoda lui Pollard.</div>';
          return;
        }

        const n = BigInt(nText);
        const x0 = BigInt(x0Text);
        const maxPairs = Number(stepsText);

        if (!nText || !fxText || !x0Text || !stepsText) {
  output.innerHTML = '<div class="bad">Completează toate câmpurile pentru metoda lui Pollard.</div>';
  return;
}

        if (n <= 1n) {
          output.innerHTML = '<div class="bad">n trebuie să fie mai mare decât 1.</div>';
          return;
        }

        if (!Number.isInteger(maxPairs) || maxPairs <= 0) {
          output.innerHTML = '<div class="bad">Numărul de perechi trebuie să fie un întreg pozitiv.</div>';
          return;
        }

        const f = buildFunction(fxText);

        const values = [x0];
        const rows = [];
        let foundFactor = null;

        for (let i = 1; i <= 2 * maxPairs; i++) {
          values[i] = f(values[i - 1], n);
        }

        for (let i = 1; i <= maxPairs; i++) {
          const oddIndex = 2 * i - 1;
          const evenIndex = 2 * i;

          const xOdd = values[oddIndex];
          const xEven = values[evenIndex];
          const compareIndex = i;

          const d = gcd(xEven - values[compareIndex], n);

          rows.push({
            oddIndex,
            evenIndex,
            xOdd,
            xEven,
            compareIndex,
            compareValue: values[compareIndex],
            d
          });

          if (d > 1n && d < n) {
            foundFactor = d;
            break;
          }
        }

        let html = `
          <h2 class="section-title">Soluție — Metoda ρ a lui Pollard</h2>
          <div class="inline-row">
            <span class="label-text">n =</span> ${renderCell(n.toString())}
            <span class="label-text">f(x) =</span> ${renderCell(fxText, 'long')}
            <span class="label-text">x₀ =</span> ${renderCell(x0.toString())}
          </div>

          <div class="sub-title">Iterații (rezultate mod n)</div>
          <div class="pollard-table">
        `;

        rows.forEach(row => {
          html += `
            <div class="pollard-row">
              <div class="pollard-label">x<sub>${row.oddIndex}</sub></div>
              <div class="pollard-value">${row.xOdd}</div>

              <div class="pollard-label">x<sub>${row.evenIndex}</sub></div>
              <div class="pollard-value">${row.xEven}</div>

              <div class="pollard-gcd">(|x<sub>${row.evenIndex}</sub> - x<sub>${row.compareIndex}</sub>|, n)</div>
              <div class="pollard-value">${row.d}</div>
            </div>
          `;
        });

        html += `</div>`;

        if (foundFactor) {
          const otherFactor = n / foundFactor;
          const a = foundFactor < otherFactor ? foundFactor : otherFactor;
          const b = foundFactor < otherFactor ? otherFactor : foundFactor;

          html += `
            <div class="footer-result">
              Concluzie: Cei doi factori obținuți ai lui n sunt ${a} și ${b}.
            </div>
          `;
        } else {
          html += `
            <div class="footer-result compus">
              Nu s-a găsit un factor netrivial în numărul de pași ales. Mărește numărul de perechi sau schimbă funcția f(x).
            </div>
          `;
        }

        output.innerHTML = html;

      } catch (e) {
        output.innerHTML = `<div class="bad">Eroare: ${e.message}</div>`;
      }
      
    }

   function switchMethod() {
  const method = document.getElementById('methodSelect').value;
  const millerPanel = document.getElementById('millerPanel');
  const pollardPanel = document.getElementById('pollardPanel');

function sqrtFloorBigInt(n) {
  if (n < 0n) throw new Error('Nu există radical pentru numere negative.');
  if (n < 2n) return n;

  let x0 = n;
  let x1 = (x0 + n / x0) / 2n;

  while (x1 < x0) {
    x0 = x1;
    x1 = (x0 + n / x0) / 2n;
  }

  return x0;
}

function isPerfectSquareBigInt(n) {
  if (n < 0n) return { ok: false, root: 0n };
  const r = sqrtFloorBigInt(n);
  return { ok: r * r === n, root: r };
}

function solveFermat() {
  const output = document.getElementById('output');

  try {
    const nText = document.getElementById('fermatNInput').value.trim();
    const stepsText = document.getElementById('fermatStepsInput').value.trim();

    if (!nText || !stepsText) {
      output.innerHTML = '<div class="bad">Completează toate câmpurile pentru metoda lui Fermat.</div>';
      return;
    }

    const n = BigInt(nText);
    const maxSteps = Number(stepsText);

    if (n <= 1n) {
      output.innerHTML = '<div class="bad">n trebuie să fie mai mare decât 1.</div>';
      return;
    }

    if (!Number.isInteger(maxSteps) || maxSteps <= 0) {
      output.innerHTML = '<div class="bad">Numărul de iterații trebuie să fie un întreg pozitiv.</div>';
      return;
    }

    const t0 = sqrtFloorBigInt(n);
    const rows = [];
    let found = false;
    let foundT = null;
    let foundS = null;

    for (let k = 1; k <= maxSteps; k++) {
      if (found) {
        rows.push({
          k,
          value: 'x',
          perfect: 'x'
        });
        continue;
      }

      const t = t0 + BigInt(k);
      const diff = t * t - n;
      const check = isPerfectSquareBigInt(diff);

      rows.push({
        k,
        value: diff.toString(),
        perfect: check.ok ? 'da' : 'nu'
      });

      if (check.ok) {
        found = true;
        foundT = t;
        foundS = check.root;
      }
    }

    let html = `
      <h2 class="section-title">Soluție — Metoda lui Fermat</h2>

      <div class="sub-title">Inițializare</div>
      <div class="inline-row">
        <span class="label-text">t₀ = [√n] =</span> ${renderCell(t0.toString())}
      </div>

      <div class="sub-title">Iterații</div>
      <div class="fermat-table">
    `;

    rows.forEach(row => {
      html += `
        <div class="fermat-row">
          <div class="fermat-label">t = t₀ + ${row.k}; t² − n =</div>
          <div class="fermat-value">${row.value}</div>
          <div class="fermat-label">pătrat perfect (da/nu)</div>
          <div class="fermat-value">${row.perfect}</div>
        </div>
      `;
    });

    html += `</div>`;

    if (found) {
      const a = foundT - foundS;
      const b = foundT + foundS;
      const f1 = a < b ? a : b;
      const f2 = a < b ? b : a;

      html += `
        <div class="sub-title">Valori</div>
        <div class="inline-row">
          <span class="label-text">s =</span> ${renderCell(foundS.toString())}
          <span class="label-text">t =</span> ${renderCell(foundT.toString())}
        </div>

        <div class="footer-result">
          Concluzie: Cei doi factori obținuți ai lui n sunt ${f1} și ${f2}.
        </div>
      `;
    } else {
      html += `
        <div class="footer-result compus">
          Nu s-a găsit un pătrat perfect în numărul de iterații ales. Mărește numărul de iterații.
        </div>
      `;
    }

    output.innerHTML = html;

  } catch (e) {
    output.innerHTML = '<div class="bad">Eroare la calculul prin metoda lui Fermat.</div>';
  }
}

    document.getElementById('solveFermatBtn').addEventListener('click', solveFermat);
